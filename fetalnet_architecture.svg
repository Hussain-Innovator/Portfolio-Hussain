<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 1180" style="background:#ffffff; font-family: Arial, sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">FetalNet — Model Architecture</text>
  <text x="340" y="46" text-anchor="middle" font-size="12" fill="#666666">Fine-Grained Classification of Fetal Ultrasound Planes · Iqra University FYP 2025</text>

  <!-- ── INPUT IMAGE ── -->
  <rect x="220" y="62" width="240" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a" dominant-baseline="central">Input Image</text>
  <text x="340" y="96" text-anchor="middle" font-size="11" fill="#5f5e5a" dominant-baseline="central">Grayscale ultrasound scan (PNG / JPG)</text>

  <line x1="340" y1="106" x2="340" y2="128" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── PREPROCESSING ── -->
  <rect x="180" y="130" width="320" height="56" rx="8" fill="#e1f5ee" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="149" text-anchor="middle" font-size="13" font-weight="600" fill="#085041" dominant-baseline="central">Preprocessing</text>
  <text x="340" y="167" text-anchor="middle" font-size="11" fill="#0f6e56" dominant-baseline="central">Grayscale → RGB · Resize 224×224 · Normalise mean=[0.5] std=[0.5]</text>
  <!-- badge -->
  <rect x="512" y="143" width="120" height="22" rx="4" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="572" y="154" text-anchor="middle" font-size="11" fill="#085041" dominant-baseline="central">Tensor 3×224×224</text>
  <line x1="500" y1="154" x2="510" y2="154" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="186" x2="340" y2="208" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── MOBILENETV2 BACKBONE CONTAINER ── -->
  <rect x="172" y="210" width="336" height="106" rx="10" fill="#eeedfe" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="228" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c" dominant-baseline="central">MobileNetV2 Backbone</text>
  <text x="340" y="244" text-anchor="middle" font-size="11" fill="#534AB7" dominant-baseline="central">Pretrained ImageNet weights · All parameters frozen</text>
  <!-- inner box -->
  <rect x="196" y="252" width="288" height="50" rx="6" fill="#cecbf6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#26215c" dominant-baseline="central">Inverted Residual Blocks (18 layers)</text>
  <text x="340" y="286" text-anchor="middle" font-size="11" fill="#3c3489" dominant-baseline="central">Depthwise-separable convolutions · Width multiplier 1.0</text>
  <!-- badge -->
  <rect x="512" y="266" width="120" height="22" rx="4" fill="#cecbf6" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="572" y="277" text-anchor="middle" font-size="11" fill="#26215c" dominant-baseline="central">Feature map 1280 ch</text>
  <line x1="484" y1="277" x2="510" y2="277" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="316" x2="340" y2="340" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CONV BLOCK 1 ── -->
  <rect x="196" y="342" width="288" height="56" rx="8" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53" dominant-baseline="central">Conv Block 1</text>
  <text x="340" y="380" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">Conv2d(1280→256, 3×3) · BN · ReLU · MaxPool(2)</text>
  <!-- badge -->
  <rect x="512" y="355" width="120" height="22" rx="4" fill="#b5d4f4" stroke="#378ADD" stroke-width="0.5"/>
  <text x="572" y="366" text-anchor="middle" font-size="11" fill="#042c53" dominant-baseline="central">256 ch · H/2 × W/2</text>
  <line x1="484" y1="366" x2="510" y2="366" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="398" x2="340" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── SE BLOCK (attention) ── -->
  <rect x="174" y="420" width="336" height="88" rx="10" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="516" y="434" font-size="11" fill="#BA7517" dominant-baseline="central">Attention module</text>
  <rect x="184" y="428" width="316" height="72" rx="8" fill="#faeeda" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="449" text-anchor="middle" font-size="13" font-weight="600" fill="#412402" dominant-baseline="central">SE Block — Squeeze-and-Excitation</text>
  <text x="340" y="467" text-anchor="middle" font-size="11" fill="#854F0B" dominant-baseline="central">AdaptiveAvgPool → FC(256→32) → ReLU</text>
  <text x="340" y="483" text-anchor="middle" font-size="11" fill="#854F0B" dominant-baseline="central">FC(32→256) → Sigmoid → Channel-wise scale ×</text>
  <!-- badge -->
  <rect x="512" y="448" width="120" height="22" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="572" y="459" text-anchor="middle" font-size="11" fill="#412402" dominant-baseline="central">256 ch recalibrated</text>
  <line x1="500" y1="459" x2="510" y2="459" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="508" x2="340" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CONV BLOCK 2 ── -->
  <rect x="196" y="532" width="288" height="56" rx="8" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="552" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53" dominant-baseline="central">Conv Block 2</text>
  <text x="340" y="570" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">Conv2d(256→128, 3×3) · BN · ReLU · AdaptiveAvgPool(1)</text>
  <!-- badge -->
  <rect x="512" y="545" width="120" height="22" rx="4" fill="#b5d4f4" stroke="#378ADD" stroke-width="0.5"/>
  <text x="572" y="556" text-anchor="middle" font-size="11" fill="#042c53" dominant-baseline="central">128 ch · 1×1</text>
  <line x1="484" y1="556" x2="510" y2="556" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="340" y1="588" x2="340" y2="610" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── FLATTEN ── -->
  <rect x="240" y="612" width="200" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="630" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a" dominant-baseline="central">Flatten</text>
  <text x="340" y="646" text-anchor="middle" font-size="11" fill="#5f5e5a" dominant-baseline="central">128-dimensional feature vector</text>

  <line x1="340" y1="656" x2="340" y2="678" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── FC LAYER ── -->
  <rect x="220" y="680" width="240" height="44" rx="8" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="698" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53" dominant-baseline="central">Fully Connected — FC(128→128)</text>
  <text x="340" y="714" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">Linear · ReLU</text>

  <line x1="340" y1="724" x2="340" y2="746" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── DROPOUT ── -->
  <rect x="260" y="748" width="160" height="36" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="762" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2a" dominant-baseline="central">Dropout</text>
  <text x="340" y="776" text-anchor="middle" font-size="11" fill="#5f5e5a" dominant-baseline="central">rate = 0.5</text>

  <line x1="340" y1="784" x2="340" y2="806" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── OUTPUT FC ── -->
  <rect x="220" y="808" width="240" height="44" rx="8" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="826" text-anchor="middle" font-size="13" font-weight="600" fill="#042c53" dominant-baseline="central">Output Layer — FC(128→6)</text>
  <text x="340" y="842" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">Logits · Softmax for probabilities</text>

  <line x1="340" y1="852" x2="340" y2="876" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── 6 OUTPUT CLASSES container ── -->
  <rect x="160" y="878" width="360" height="44" rx="10" fill="#e1f5ee" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="340" y="893" text-anchor="middle" font-size="13" font-weight="600" fill="#04342c" dominant-baseline="central">6 Output Classes</text>
  <text x="340" y="909" text-anchor="middle" font-size="11" fill="#0f6e56" dominant-baseline="central">Predicted fetal anatomical plane + confidence score</text>

  <!-- Row 1 -->
  <rect x="164" y="934" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="216" y="952" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Fetal brain</text>

  <rect x="288" y="934" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="952" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Fetal abdomen</text>

  <rect x="412" y="934" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="464" y="952" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Fetal thorax</text>

  <!-- Row 2 -->
  <rect x="164" y="980" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="216" y="998" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Fetal femur</text>

  <rect x="288" y="980" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="998" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Maternal cervix</text>

  <rect x="412" y="980" width="104" height="36" rx="6" fill="#9fe1cb" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="464" y="998" text-anchor="middle" font-size="11" fill="#04342c" dominant-baseline="central">Other</text>

  <!-- ── LEFT LABELS — Training phases ── -->
  <line x1="158" y1="342" x2="158" y2="588" stroke="#cccccc" stroke-width="0.5" stroke-dasharray="3 3"/>
  <rect x="20" y="430" width="118" height="50" rx="6" fill="none" stroke="#cccccc" stroke-width="0.5"/>
  <text x="79" y="448" text-anchor="middle" font-size="10" fill="#666666" dominant-baseline="central">Phase 1 — frozen</text>
  <text x="79" y="464" text-anchor="middle" font-size="10" fill="#666666" dominant-baseline="central">LR = 1e-4 · 10 epochs</text>
  <line x1="138" y1="455" x2="156" y2="455" stroke="#cccccc" stroke-width="0.5"/>

  <line x1="158" y1="680" x2="158" y2="852" stroke="#cccccc" stroke-width="0.5" stroke-dasharray="3 3"/>
  <rect x="20" y="740" width="118" height="50" rx="6" fill="none" stroke="#cccccc" stroke-width="0.5"/>
  <text x="79" y="758" text-anchor="middle" font-size="10" fill="#666666" dominant-baseline="central">Phase 2 — fine-tune</text>
  <text x="79" y="774" text-anchor="middle" font-size="10" fill="#666666" dominant-baseline="central">LR = 1e-5 · 10 epochs</text>
  <line x1="138" y1="765" x2="156" y2="765" stroke="#cccccc" stroke-width="0.5"/>

  <!-- ── BOTTOM METRICS ── -->
  <line x1="40" y1="1034" x2="640" y2="1034" stroke="#dddddd" stroke-width="0.5"/>
  <text x="340" y="1052" text-anchor="middle" font-size="11" fill="#666666" dominant-baseline="central">Final results — Test acc. 93.01% · Weighted F1 0.93 · Macro F1 0.91 · Best val. acc. 93.34%</text>

  <rect x="44"  y="1064" width="132" height="44" rx="8" fill="#eeedfe" stroke="#534AB7" stroke-width="0.5"/>
  <text x="110" y="1082" text-anchor="middle" font-size="14" font-weight="600" fill="#26215c" dominant-baseline="central">93.01%</text>
  <text x="110" y="1098" text-anchor="middle" font-size="11" fill="#534AB7" dominant-baseline="central">Test accuracy</text>

  <rect x="196" y="1064" width="132" height="44" rx="8" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.5"/>
  <text x="262" y="1082" text-anchor="middle" font-size="14" font-weight="600" fill="#042c53" dominant-baseline="central">0.93</text>
  <text x="262" y="1098" text-anchor="middle" font-size="11" fill="#185FA5" dominant-baseline="central">Weighted F1</text>

  <rect x="348" y="1064" width="132" height="44" rx="8" fill="#e1f5ee" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="414" y="1082" text-anchor="middle" font-size="14" font-weight="600" fill="#04342c" dominant-baseline="central">0.91</text>
  <text x="414" y="1098" text-anchor="middle" font-size="11" fill="#0f6e56" dominant-baseline="central">Macro F1</text>

  <rect x="500" y="1064" width="136" height="44" rx="8" fill="#faeeda" stroke="#BA7517" stroke-width="0.5"/>
  <text x="568" y="1082" text-anchor="middle" font-size="14" font-weight="600" fill="#412402" dominant-baseline="central">100%</text>
  <text x="568" y="1098" text-anchor="middle" font-size="11" fill="#854F0B" dominant-baseline="central">Cervix recall</text>

</svg>
